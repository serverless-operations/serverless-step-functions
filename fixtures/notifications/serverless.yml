service: integration-notifications

provider: ${file(../base.yml):provider}
plugins: ${file(../base.yml):plugins}
package: ${file(../base.yml):package}
custom: ${file(../base.yml):custom}

resources:
  Resources:
    NotificationTopic:
      Type: AWS::SNS::Topic
    NotificationQueue:
      Type: AWS::SQS::Queue

stepFunctions:
  stateMachines:
    notificationMachine:
      name: integration-notifications-${opt:stage, 'test'}
      definition:
        StartAt: PassThrough
        States:
          PassThrough:
            Type: Pass
            End: true
      notifications:
        FAILED:
          - sns:
              Ref: NotificationTopic
        SUCCEEDED:
          - sqs:
              Fn::GetAtt: [NotificationQueue, Arn]
